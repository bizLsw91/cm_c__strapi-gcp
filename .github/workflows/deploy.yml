name: Deploy to GCP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check admin/package changes
        id: change_check
        run: |
          git fetch origin master --depth=2
          if git diff --name-only HEAD~1 HEAD | grep -qE "^src/admin/|^package.*json"; then
            echo "heavy_change=true" >> $GITHUB_OUTPUT
            echo "🔴 Admin or package changed - full build"
          else
            echo "heavy_change=false" >> $GITHUB_OUTPUT
            echo "🟢 Source only - cache build"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: bizLsw91
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/bizlsw91/cm_c__strapi-gcp:latest
          cache-from: type=gha
          cache-to: ${{ steps.change_check.outputs.heavy_change == 'true' && 'type=gha,mode=max' || 'type=gha' }}
          build-args: |
            NODE_ENV=production

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_PORT || 22 }}
          command_timeout: 30m
          script_stop: true
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u bizlsw91 --password-stdin
            sudo docker pull ghcr.io/bizlsw91/cm_c__strapi-gcp:latest

            sudo docker stop cmc-strapi 2>/dev/null || true
            sudo docker rm cmc-strapi 2>/dev/null || true

            sudo docker run -d \
              --name cmc-strapi \
              --restart unless-stopped \
              -p 1337:1337 \
              --memory="700m" \
              --memory-swap="2g" \
              -e NODE_ENV=production \
              -e HOST=0.0.0.0 \
              -e PORT=1337 \
              -e URL="https://admin.culturemarketing.co.kr" \
              -e DATABASE_CLIENT=mysql \
              -e DATABASE_HOST=mysql-strapi-cmc-strapi.a.aivencloud.com \
              -e DATABASE_NAME=cm_c__strapi_db \
              -e DATABASE_PORT=24267 \
              -e DATABASE_SSL=true \
              -e DATABASE_USERNAME=avnadmin \
              -e FIREBASE_STORAGE_BUCKET=store-892ea.firebasestorage.app \
              -e SMTP_HOST=smtp.naver.com \
              -e SMTP_PORT=587 \
              -e SMTP_USERNAME=mm999999@naver.com \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e DATABASE_SSL_CA_CONTENT="${{ secrets.DATABASE_SSL_CA_CONTENT }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e ADMIN_JWT_SECRET="${{ secrets.ADMIN_JWT_SECRET }}" \
              -e APP_KEYS="${{ secrets.APP_KEYS }}" \
              -e API_TOKEN_SALT="${{ secrets.API_TOKEN_SALT }}" \
              -e TRANSFER_TOKEN_SALT="${{ secrets.TRANSFER_TOKEN_SALT }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              -e FIREBASE_SERVICE_ACCOUNT="${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" \
              ghcr.io/bizlsw91/cm_c__strapi-gcp:latest

            echo "⏳ 컨테이너 기동 대기 중..."
            sleep 30
            sudo docker ps | grep cmc-strapi && echo "✅ 배포 성공" || echo "❌ 컨테이너 실행 실패"
            sudo docker image prune -f || true
